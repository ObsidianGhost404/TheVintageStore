<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — The Vintage Store</title>
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/pages.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>

<nav class="navbar">
  <div class="container">
    <div class="navbar__inner">
      <a href="index.html" class="navbar__logo"><img src="assets/images/logo.jpg" alt="The Vintage Store"></a>
      <div style="font-family:var(--font-condensed);font-size:0.72rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--color-text-muted);">Secure Checkout</div>
      <div style="display:flex;align-items:center;gap:6px;font-family:var(--font-condensed);font-size:0.72rem;color:var(--color-text-muted);">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        SSL Secured
      </div>
    </div>
  </div>
</nav>

<main class="checkout-page">
  <div class="container container--narrow">
    <div class="checkout-layout">
      <!-- Form -->
      <div>
        <h1 class="checkout-title">Checkout</h1>

        <!-- Contact -->
        <div class="checkout-section">
          <div class="checkout-section-title">01 — Contact Information</div>
          <div class="checkout-form">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">First Name *</label>
                <input type="text" class="form-input" placeholder="Arjun">
              </div>
              <div class="form-group">
                <label class="form-label">Last Name *</label>
                <input type="text" class="form-input" placeholder="Sharma">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Email Address *</label>
              <input type="email" class="form-input" placeholder="arjun@email.com">
            </div>
            <div class="form-group">
              <label class="form-label">Phone Number *</label>
              <input type="tel" class="form-input" placeholder="+91 98765 43210">
            </div>
          </div>
        </div>

        <!-- Shipping -->
        <div class="checkout-section">
          <div class="checkout-section-title">02 — Shipping Address</div>
          <div class="checkout-form">
            <div class="form-group">
              <label class="form-label">Address Line 1 *</label>
              <input type="text" class="form-input" placeholder="House/Flat No., Street Name">
            </div>
            <div class="form-group">
              <label class="form-label">Address Line 2</label>
              <input type="text" class="form-input" placeholder="Landmark, Area (optional)">
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">City *</label>
                <input type="text" class="form-input" placeholder="Mumbai">
              </div>
              <div class="form-group">
                <label class="form-label">State *</label>
                <select class="form-select">
                  <option value="">Select State</option>
                  <option>Maharashtra</option>
                  <option>Delhi</option>
                  <option>Karnataka</option>
                  <option>Tamil Nadu</option>
                  <option>Uttar Pradesh</option>
                  <option>West Bengal</option>
                  <option>Gujarat</option>
                  <option>Rajasthan</option>
                  <option>Punjab</option>
                  <option>Haryana</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">PIN Code *</label>
                <input type="text" class="form-input" placeholder="400001" maxlength="6">
              </div>
              <div class="form-group">
                <label class="form-label">Country</label>
                <input type="text" class="form-input" value="India" readonly style="opacity:0.6;">
              </div>
            </div>
          </div>
        </div>

        <!-- Payment -->
        <div class="checkout-section">
          <div class="checkout-section-title">03 — Payment Method</div>
          <div class="payment-methods">
            <label class="payment-method">
              <input type="radio" name="payment" value="cod" checked>
              <div>
                <div class="payment-method__label">Cash on Delivery (COD)</div>
                <div style="font-size:0.78rem;color:var(--color-text-muted);margin-top:3px;">Pay when your order arrives</div>
              </div>
            </label>
            <label class="payment-method">
              <input type="radio" name="payment" value="upi">
              <div>
                <div class="payment-method__label">UPI / QR Code</div>
                <div style="font-size:0.78rem;color:var(--color-text-muted);margin-top:3px;">Google Pay, PhonePe, Paytm</div>
              </div>
            </label>
            <label class="payment-method">
              <input type="radio" name="payment" value="card">
              <div>
                <div class="payment-method__label">Credit / Debit Card</div>
                <div style="font-size:0.78rem;color:var(--color-text-muted);margin-top:3px;">Visa, Mastercard, RuPay</div>
              </div>
            </label>
            <label class="payment-method">
              <input type="radio" name="payment" value="netbanking">
              <div>
                <div class="payment-method__label">Net Banking</div>
                <div style="font-size:0.78rem;color:var(--color-text-muted);margin-top:3px;">All major Indian banks</div>
              </div>
            </label>
          </div>
        </div>

        <button class="btn btn--primary btn--full btn--lg" onclick="placeOrder()">
          Place Order
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        </button>

        <p style="font-size:0.75rem;color:var(--color-text-muted);text-align:center;margin-top:16px;">
          By placing your order, you agree to our <a href="policy.html#terms" style="color:var(--color-accent);">Terms of Service</a> and <a href="policy.html#privacy" style="color:var(--color-accent);">Privacy Policy</a>.
        </p>
      </div>

      <!-- Order Summary -->
      <div class="cart-summary" style="position:sticky;top:calc(var(--nav-height) + 20px);">
        <div class="cart-summary__title">Order Summary</div>
        <div id="checkout-items" style="margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--color-border);">
          <!-- Populated by JS -->
        </div>
        <div class="summary-row">
          <span class="summary-row__label">Subtotal</span>
          <span class="summary-row__value summary-subtotal">₹0</span>
        </div>
        <div class="summary-row">
          <span class="summary-row__label">Shipping</span>
          <span class="summary-row__value summary-shipping">₹99</span>
        </div>
        <div class="summary-row summary-row--total">
          <span class="summary-row__label">Total</span>
          <span class="summary-row__value summary-total">₹0</span>
        </div>
      </div>
    </div>
  </div>
</main>

<div class="toast-container"></div>
<script src="assets/js/main.js"></script>
<script src="assets/js/cart.js"></script>
<script src="assets/js/api.js"></script>
<script>
/* Fallback: define Cart inline in case cart.js didn't load */
if (typeof Cart === 'undefined') {
  window.Cart = {
    get() { try { return JSON.parse(localStorage.getItem('tvs_cart') || '[]'); } catch { return []; } },
    clear() { localStorage.removeItem('tvs_cart'); },
    getTotal() { return this.get().reduce((s,i) => s + i.price * i.qty, 0); },
    getCount() { return this.get().reduce((s,i) => s + i.qty, 0); },
    updateSummary() {
      const sub = this.getTotal();
      const ship = sub >= 999 ? 0 : 99;
      const fmt = n => '₹' + n.toLocaleString('en-IN');
      const set = (sel, val) => { const el = document.querySelector(sel); if(el) el.textContent = val; };
      set('.summary-subtotal', fmt(sub));
      set('.summary-shipping', ship === 0 ? 'FREE' : fmt(ship));
      set('.summary-total', fmt(sub + ship));
      set('.summary-item-count', this.getCount() + ' item' + (this.getCount() !== 1 ? 's' : ''));
    }
  };
}
if (typeof TVS === 'undefined') {
  window.TVS = {
    showToast(title, msg) { alert(title + ': ' + msg); }
  };
}

document.addEventListener('DOMContentLoaded', () => {
  // Populate checkout summary
  const items = Cart.get();
  const container = document.getElementById('checkout-items');
  if (container) {
    if (!items.length) {
      container.innerHTML = '<p style="color:var(--color-text-muted);font-size:0.85rem;">No items in cart.</p>';
    } else {
      container.innerHTML = items.map(item => `
        <div style="display:flex;gap:12px;align-items:center;margin-bottom:12px;">
          <img src="${item.image}" style="width:56px;height:72px;object-fit:cover;object-position:top;background:var(--color-bg-3);" alt="${item.name}">
          <div style="flex:1;">
            <div style="font-family:var(--font-condensed);font-size:0.82rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;">${item.name}</div>
            <div style="font-size:0.72rem;color:var(--color-text-muted);margin-top:2px;">Size: ${item.size} · Qty: ${item.qty}</div>
          </div>
          <div style="font-family:var(--font-condensed);font-size:0.88rem;font-weight:600;">₹${(item.price * item.qty).toLocaleString('en-IN')}</div>
        </div>
      `).join('');
    }
  }
  Cart.updateSummary();
});

function placeOrder() {
  const items = Cart.get();
  if (!items.length) {
    TVS.showToast('Empty Cart', 'Please add items to your cart first.');
    return;
  }
  const btn = document.querySelector('[onclick="placeOrder()"]');
  if (btn) { btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> Processing...'; }
  setTimeout(() => {
    Cart.clear();
    TVS.showToast('Order Placed!', 'Thank you for shopping with The Vintage Store.');
    setTimeout(() => window.location.href = 'index.html', 2000);
  }, 1500);
}
</script>
</body>
</html>
